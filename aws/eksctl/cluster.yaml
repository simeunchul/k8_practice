# Terraform 대신 빠르게 띄우고 싶을 때. eksctl create cluster -f cluster.yaml
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: econ-eks
  region: ap-northeast-2
  version: "1.31"

iam:
  withOIDC: true   # IRSA(서비스어카운트 IAM) 사용 가능하게

managedNodeGroups:
  - name: default
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 3
    volumeSize: 30
    iam:
      withAddonPolicies:
        # 노드에 S3 접근 등 필요한 정책. 세밀한 제어는 IRSA 권장.
        autoScaler: true
