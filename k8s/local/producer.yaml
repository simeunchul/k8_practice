# producer — econ.indicators 토픽으로 mock 경제지표를 상시 발행 (K8s Deployment)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: econ-producer
  namespace: econ
  labels:
    app: econ-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: econ-producer
  template:
    metadata:
      labels:
        app: econ-producer
    spec:
      containers:
        - name: producer
          image: econ-producer:0.1
          imagePullPolicy: IfNotPresent   # kind load 로 주입한 로컬 이미지 사용
          args: ["--mock"]
          env:
            - { name: KAFKA_BOOTSTRAP_SERVERS, value: "kafka:9092" }
            - { name: KAFKA_TOPIC, value: "econ.indicators" }
            - { name: POLL_INTERVAL_SECONDS, value: "5" }
            - { name: PYTHONUNBUFFERED, value: "1" }   # 컨테이너 로그 실시간 flush
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "250m", memory: "256Mi" }
