# 단일 노드 Kafka (KRaft, Zookeeper 없음) — Strimzi 오퍼레이터 없이 평범한 Deployment+Service.
# docker-compose.yml 의 apache/kafka:3.9.0 설정을 K8s 로 옮긴 것.
# 클러스터 내부 부트스트랩 주소: kafka.econ.svc.cluster.local:9092 (같은 ns 에선 kafka:9092)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: econ
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          ports:
            - { containerPort: 9092, name: client }
            - { containerPort: 9093, name: controller }
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@localhost:9093" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka.econ.svc.cluster.local:9092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "true" }
          # readiness: 브로커가 9092 클라이언트 리스너를 열면 Ready
          # (kafka-topics.sh 는 JVM CLI 라 cpu 제한 파드에서 cold-start 가 느려 probe 로 부적합)
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: econ
  labels:
    app: kafka
spec:
  selector:
    app: kafka
  ports:
    - { name: client, port: 9092, targetPort: 9092 }
